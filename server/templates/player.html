<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/player.css">
</head>
<body>
<div id="top-bar">
  <a id="back-btn" href="/">&larr; Back</a>
</div>
<div id="player-container">
  <video id="v" controls playsinline webkit-playsinline data-playlist-url="{{playlist_url}}" data-video-id="{{video_id}}" data-subtitle-url="{{subtitle_url}}"></video>
  <button id="fs-btn" title="Fullscreen"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 5V2h3M14 11v3h-3M11 2h3v3M5 14H2v-3"/></svg></button>
  <button id="fs-exit-btn" title="Exit fullscreen">&times;</button>
</div>
<script src="/static/player.js"></script>
</body>
</html>
