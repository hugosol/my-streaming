<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>My Streaming</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
<h1>My Streaming</h1>

<div class="input-section">
    <form id="job-form">
        <input type="text" id="yt-url" name="url" placeholder="YouTube 链接..." autocomplete="off">
        <button type="submit">提交</button>
    </form>
    <div id="form-msg"></div>
</div>

{{jobs}}

<h2>视频</h2>
{{items}}

<script>
// Job form submission
document.getElementById('job-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const url = document.getElementById('yt-url').value.trim();
    const msg = document.getElementById('form-msg');
    if (!url) { msg.textContent = '请输入链接'; return; }

    msg.textContent = '提交中...';
    try {
        const resp = await fetch('/api/jobs', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });
        const data = await resp.json();
        if (resp.ok) {
            document.getElementById('yt-url').value = '';
            msg.textContent = '已提交，刷新页面查看进度';
        } else {
            msg.textContent = data.error || '提交失败';
        }
    } catch (err) {
        msg.textContent = '服务器错误: ' + err.message;
    }
});

// Delete button handler (event delegation)
document.addEventListener('click', async function(e) {
    const btn = e.target.closest('.job-delete-btn');
    if (!btn || btn.disabled) return;

    const jobId = btn.dataset.jobId;
    const msgEl = btn.parentElement.querySelector('.job-msg');
    btn.disabled = true;
    btn.textContent = '...';

    try {
        const resp = await fetch('/api/jobs/' + jobId + '/delete', { method: 'POST' });
        const data = await resp.json();
        if (resp.ok) {
            btn.closest('.job-item').remove();
        } else {
            btn.disabled = false;
            btn.textContent = '删除';
            if (msgEl) msgEl.textContent = data.error || '删除失败';
        }
    } catch (err) {
        btn.disabled = false;
        btn.textContent = '\u5220\u9664';
        if (msgEl) msgEl.textContent = '\u670d\u52a1\u5668\u9519\u8bef: ' + err.message;
    }
});

// Retry button handler (event delegation)
document.addEventListener('click', async function(e) {
    const btn = e.target.closest('.job-retry-btn');
    if (!btn || btn.disabled) return;

    const jobId = btn.dataset.jobId;
    const msgEl = btn.parentElement.querySelector('.job-msg');
    btn.disabled = true;
    btn.textContent = '...';

    try {
        const resp = await fetch('/api/jobs/' + jobId + '/retry', { method: 'POST' });
        const data = await resp.json();
        if (resp.ok) {
            if (msgEl) msgEl.textContent = '\u91cd\u8bd5\u5df2\u542f\u52a8';
        } else {
            btn.disabled = false;
            btn.textContent = '\u91cd\u8bd5';
            if (msgEl) msgEl.textContent = data.error || '\u91cd\u8bd5\u5931\u8d25';
        }
    } catch (err) {
        btn.disabled = false;
        btn.textContent = '\u91cd\u8bd5';
        if (msgEl) msgEl.textContent = '\u670d\u52a1\u5668\u9519\u8bef: ' + err.message;
    }
});

// Video delete button handler (event delegation)
document.addEventListener('click', async function(e) {
    const btn = e.target.closest('.video-delete-btn');
    if (!btn || btn.disabled) return;

    const videoMd5 = btn.dataset.videoMd5;
    const videoName = btn.parentElement.querySelector('a').textContent;
    if (!confirm('确定要删除视频 ' + videoName + ' 及其所有关联数据吗？')) return;

    btn.disabled = true;
    btn.textContent = '...';
    try {
        const resp = await fetch('/api/videos/' + videoMd5 + '/delete', { method: 'POST' });
        const data = await resp.json();
        if (resp.ok) {
            location.reload();
        } else {
            alert(data.error || '删除失败');
            btn.disabled = false;
            btn.textContent = '删除';
        }
    } catch (err) {
        alert('服务器错误: ' + err.message);
        btn.disabled = false;
        btn.textContent = '删除';
    }
});

// Video redownload button handler (event delegation)
document.addEventListener('click', async function(e) {
    const btn = e.target.closest('.video-redownload-btn');
    if (!btn || btn.disabled) return;

    const videoMd5 = btn.dataset.videoMd5;
    const videoName = btn.parentElement.querySelector('a').textContent;
    if (!confirm('确定要重新下载视频 ' + videoName + ' 吗？这将删除现有文件并重新处理。')) return;

    btn.disabled = true;
    btn.textContent = '...';
    try {
        const resp = await fetch('/api/videos/' + videoMd5 + '/redownload', { method: 'POST' });
        const data = await resp.json();
        if (resp.ok) {
            location.reload();
        } else {
            alert(data.error || '重新下载失败');
            btn.disabled = false;
            btn.textContent = '重新下载';
        }
    } catch (err) {
        alert('服务器错误: ' + err.message);
        btn.disabled = false;
        btn.textContent = '重新下载';
    }
});
</script>
</html>
